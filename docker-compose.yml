services:
  frontend:
    build: ./frontend
    ports:
      - 5173:5173 
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build: ./backend
    ports:
      - 3000:3000
    env_file:
      - .env 
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
      
  db:
    image: postgres:16-alpine
    ports:
      - 5432:5432 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data 

volumes:
  postgres_data:
