services:
  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:${image_tag}
    networks:
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.constraint-label=traefik-public"
        - "traefik.swarm.network=traefik-public"

        - "traefik.http.routers.${stack_name}-http.rule=Host(`${stack_name}.doe25.swarm.chas-lab.dev`)"
        - "traefik.http.routers.${stack_name}-http.entrypoints=http"
        - "traefik.http.routers.${stack_name}-http.middlewares=https-redirect"

        - "traefik.http.routers.${stack_name}-https.rule=Host(`${stack_name}.doe25.swarm.chas-lab.dev`)"
        - "traefik.http.routers.${stack_name}-https.entrypoints=https"
        - "traefik.http.routers.${stack_name}-https.tls=true"
        - "traefik.http.routers.${stack_name}-https.tls.certresolver=le"

        - "traefik.http.services.${stack_name}.loadbalancer.server.port=5173"

  backend:
    image: ${CI_REGISTRY_IMAGE}/backend:${image_tag}
    networks:
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.constraint-label=traefik-public"
        - "traefik.swarm.network=traefik-public"

        - "traefik.http.routers.${stack_name}-backend-http.rule=Host(`api.${stack_name}.doe25.swarm.chas-lab.dev`)"
        - "traefik.http.routers.${stack_name}-backend-http.entrypoints=http"
        - "traefik.http.routers.${stack_name}-backend-http.middlewares=https-redirect"

        - "traefik.http.routers.${stack_name}-backend-https.rule=Host(`api.${stack_name}.doe25.swarm.chas-lab.dev`)"
        - "traefik.http.routers.${stack_name}-backend-https.entrypoints=https"
        - "traefik.http.routers.${stack_name}-backend-https.tls=true"
        - "traefik.http.routers.${stack_name}-backend-https.tls.certresolver=le"

        - "traefik.http.services.${stack_name}-backend.loadbalancer.server.port=3000"


networks:
  traefik-public:
    external: true

