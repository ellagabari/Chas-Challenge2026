  image: $CI_REGISTRY_IMAGE/backend:test-$REGISTRY_TAG 
  needs:
    - job: build backend 
      artifacts: true
  before_script:
      - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
  script:
    - echo "doing alot of cool tests"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_REF_NAME == $DEVELOPMENT_BRANCH

#Deploys to development or feature branch
deploy development:
  stage: deploy
  image: ${CI_REGISTRY_IMAGE}/python-utils:latest
  environment: 
    name: review/$CI_COMMIT_REF_SLUG
    url: https://$CI_PROJECT_NAMESPACE_SLUG-$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG.doe25.swarm.chas-lab.dev
#    on_stop: stop_review
  script:
    - cd scripts
    - python3 deploy.py
  rules:
    - if: $CI_COMMIT_REF_NAME == $DEVELOPMENT_BRANCH
    - if: $CI_COMMIT_REF_NAME =~ /\//

#Deploys to production, only runs when we push into main
deploy production:
  stage: deploy
  image: ${CI_REGISTRY_IMAGE}/python-utils:latest
  environment:
    name: production/$CI_COMMIT_REF_SLUG
    url: https://$CI_PROJECT_NAMESPACE_SLUG-$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG.doe25.swarm.chas-lab.dev
  script:
    - cd scripts
    - python3 deploy.py
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

