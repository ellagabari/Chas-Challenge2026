apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litter-hero-${CI_COMMIT_REF_SLUG}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: doe25-group-2-test-basic-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: ${FRONTEND_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-${CI_COMMIT_REF_SLUG}
                port:
                  number: 8080
    - host: ${BACKEND_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-${CI_COMMIT_REF_SLUG}
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litter-hero-api-${CI_COMMIT_REF_SLUG}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
    - host: ${FRONTEND_HOST}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-${CI_COMMIT_REF_SLUG}
                port:
                  number: 3000
