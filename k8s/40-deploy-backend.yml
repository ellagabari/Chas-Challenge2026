apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-${CI_COMMIT_REF_SLUG}
  labels:
    app: backend-${CI_COMMIT_REF_SLUG}
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-${CI_COMMIT_REF_SLUG}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: backend-${CI_COMMIT_REF_SLUG}
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: backend-${CI_COMMIT_REF_SLUG}
          image: ${CI_REGISTRY_IMAGE}/backend:${CI_COMMIT_SHA}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: cc-secrets
            - secretRef:
                name: resend-secret
            - configMapRef:
                name: backend-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend-${CI_COMMIT_REF_SLUG}
  labels:
    app: backend-${CI_COMMIT_REF_SLUG}
    component: backend
spec:
  type: ClusterIP
  selector:
    app: backend-${CI_COMMIT_REF_SLUG}
  ports:
    - name: http
      port: 3000
      targetPort: http
