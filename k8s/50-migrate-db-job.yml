apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate-${CI_COMMIT_REF_SLUG}
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: migrate
          image: ${CI_REGISTRY_IMAGE}/backend:${CI_COMMIT_SHA}
          command: ["npm", "run", "db:migrate:prod"]
          env:
            - name: NO_COLOR
              value: "1"
            - name: CI
              value: "true"
          envFrom:
            - secretRef:
                name: cc-secrets
            - configMapRef:
                name: backend-config
