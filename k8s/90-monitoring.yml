apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: litter-hero-dashboard
  labels:
    release: monitoring # This label must be there!
spec:
  selector:
    matchLabels:
      component: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: litter-hero-dashboard
  labels:
    release: monitoring # This needs to be there!
spec:
  groups:
    - name: backend.rules
      rules:
        - alert: backendHighErrorRate
          expr: |
            sum(rate(http_request_duration_seconds_count{namespace="doe25-group-2",status_code=~"5..",path!="/metrics"}[5m]))
              /
            sum(rate(http_request_duration_seconds_count{namespace="doe25-group-2",path!="/metrics"}[5m]))
              > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "test-rest-api 5xx rate above 5% (5m)"
            description: "More than 5% of requests are returning 5xx for the last 5 minutes."
        - alert: TestRestApiNoTraffic
          expr: |
            sum(rate(http_request_duration_seconds_count{namespace="doe25-group-2",path!="/metrics"}[10m])) == 0
          for: 15m
          labels:
            severity: info
          annotations:
            summary: "test-rest-api has received no traffic for 15m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litter-hero-dashboard
  labels:
    grafana_dashboard: "1" # This needs to be there!
data:
  litter-hero-dashboard.json: |
    {
      "title": "litter-hero",
      "uid": "litter-hero",
      "schemaVersion": 39,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "tags": ["chas-academy", "doe25"],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(http_request_duration_seconds_count, namespace)",
            "current": { "text": "doe25-group-2", "value": "doe25-group-2" },
            "refresh": 1,
            "includeAll": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request rate (req/s) by path",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by (path) (rate(http_request_duration_seconds_count{namespace=\"$namespace\",path!=\"/metrics\"}[1m]))",
              "legendFormat": "{{path}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error rate (5xx, share of total)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{namespace=\"$namespace\",status_code=~\"5..\",path!=\"/metrics\"}[5m])) / clamp_min(sum(rate(http_request_duration_seconds_count{namespace=\"$namespace\",path!=\"/metrics\"}[5m])), 1)",
              "legendFormat": "5xx ratio",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0 } }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latency p95 (s) by path",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (path, le) (rate(http_request_duration_seconds_bucket{namespace=\"$namespace\",path!=\"/metrics\"}[5m])))",
              "legendFormat": "{{path}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Requests last 5m by status",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum by (status_code) (increase(http_request_duration_seconds_count{namespace=\"$namespace\",path!=\"/metrics\"}[5m]))",
              "legendFormat": "{{status_code}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
